async function deriveKey(pw) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: Uint8Array.from(atob(SALT), c=>c.charCodeAt(0)), iterations: 100000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

async function unlock() {
  const pw = document.getElementById("pw").value || localStorage.getItem("wp_pw");
  if (!pw) return;
  try {
    const key = await deriveKey(pw);
    const iv = Uint8Array.from(atob(IV), c=>c.charCodeAt(0));
    const ct = Uint8Array.from(atob(CT), c=>c.charCodeAt(0));
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    const html = new TextDecoder().decode(plain);
    localStorage.setItem("wp_pw", pw);
    document.open(); document.write(html); document.close();
  } catch(e) {
    localStorage.removeItem("wp_pw");
    document.getElementById("err").style.display = "block";
  }
}
// Auto-unlock if password is saved
if (localStorage.getItem("wp_pw")) unlock();
