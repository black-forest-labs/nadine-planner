<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

.top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155;
}
.top-bar h1 { font-size: 20px; font-weight: 600; }
.top-bar .score-badge {
    display: flex; align-items: center; gap: 8px;
    background: #334155; padding: 8px 16px; border-radius: 8px;
}
.score-num { font-size: 28px; font-weight: 700; }
.score-label { font-size: 12px; color: #94a3b8; }
.btn {
    padding: 8px 16px; border-radius: 6px; border: none;
    background: #3b82f6; color: white; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
}
.btn:hover { background: #2563eb; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn .spinner { display: none; width: 14px; height: 14px; border: 2px solid #fff4; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
.btn.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
    display: flex; gap: 0; background: #1e293b; padding: 0 24px;
    border-bottom: 1px solid #334155;
}
.tab {
    padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: #94a3b8; border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab:hover { color: #e2e8f0; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }

/* KPI Trends */
.kpi-grid {
    display: flex; flex-direction: column; gap: 8px;
}
.kpi-card {
    background: #1e293b; border-radius: 8px; padding: 10px 16px;
    border: 1px solid #334155;
    display: flex; align-items: center; gap: 16px;
}
.kpi-info { min-width: 160px; flex-shrink: 0; }
.kpi-info h3 { font-size: 11px; color: #94a3b8; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-info .current { font-size: 20px; font-weight: 700; display: inline; }
.kpi-info .target-info { font-size: 11px; color: #64748b; display: inline; margin-left: 4px; }
.kpi-chart { flex: 1; height: 40px; }

/* Week View */
.week-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
}
.week-header h2 { font-size: 18px; }
.week-stats {
    display: flex; gap: 10px; flex-wrap: wrap;
}
.week-stat {
    text-align: center; background: #1e293b; padding: 8px 14px; border-radius: 8px;
    border: 1px solid #334155;
}
.week-stat.met { border-color: #10b98155; background: #10b98112; }
.week-stat.warn { border-color: #f59e0b55; background: #f59e0b12; }
.week-stat.bad { border-color: #ef444455; background: #ef444412; }
.week-stat .val { font-size: 18px; font-weight: 700; }
.week-stat .tgt { font-size: 10px; color: #64748b; }
.week-stat .lbl { font-size: 11px; color: #94a3b8; }

.day-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
}
.day-col {
    background: #1e293b; border-radius: 12px; overflow: hidden;
    border: 1px solid #334155;
}
.day-col.today { border-color: #3b82f6; }
.day-header {
    padding: 10px 12px; background: #334155; font-weight: 600; font-size: 13px;
    display: flex; justify-content: space-between;
}
.day-header .hours { color: #94a3b8; font-weight: 400; }
.timeline {
    position: relative; height: 550px; padding: 0 8px;
}
.time-marker {
    position: absolute; left: 0; right: 0; border-top: 1px solid #1e293b;
    font-size: 9px; color: #475569; padding-left: 4px;
}
.meeting-block {
    position: absolute; left: 8px; right: 8px; border-radius: 4px;
    padding: 3px 6px; font-size: 11px; overflow: hidden;
    cursor: default; z-index: 2;
}
.meeting-block.type-1-1 { background: #1d4ed8; border-left: 3px solid #3b82f6; }
.meeting-block.type-small_group { background: #7c3aed; border-left: 3px solid #a78bfa; }
.meeting-block.type-large { background: #b45309; border-left: 3px solid #f59e0b; }
.meeting-block .mtitle { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meeting-block .mtime { font-size: 9px; color: #cbd5e1; }

.free-block {
    position: absolute; left: 8px; right: 8px; border-radius: 4px;
    background: #064e3b44; border: 1px dashed #10b98155;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #10b981; z-index: 1;
}

.legend {
    display: flex; gap: 16px; margin-top: 16px; justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }

.fetched-at { text-align: center; margin-top: 16px; font-size: 12px; color: #475569; }

@media (max-width: 900px) {
    .day-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
const DAY_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
});

async function refresh() {
    if (STATIC_MODE) {
        DATA = BAKED_DATA;
        render();
        document.getElementById('refreshBtn').style.display = 'none';
        return;
    }
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    try {
        const res = await fetch('/api/calendar');
        DATA = await res.json();
        render();
    } catch (e) {
        console.error('Fetch failed:', e);
    } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
    }
}

function render() {
    if (!DATA) return;

    // Week score
    document.getElementById('weekScore').textContent = DATA.this_week.score;
    const scoreEl = document.querySelector('.score-num');
    scoreEl.style.color = DATA.this_week.score >= 70 ? '#10b981' : DATA.this_week.score >= 40 ? '#f59e0b' : '#ef4444';

    document.getElementById('fetchedAt').textContent = 'Data fetched: ' + new Date(DATA.fetched_at).toLocaleString();

    renderKPITrends();
    renderWeekView('thisWeekView', DATA.this_week, 'This Week');
    renderWeekView('nextWeekView', DATA.next_week, 'Next Week');
}

function renderKPITrends() {
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = '';

    // Use last 12 weeks for charts
    const weeks = DATA.weekly_kpis.slice(-12);

    for (const [key, cfg] of Object.entries(KPI_CONFIG)) {
        const card = document.createElement('div');
        card.className = 'kpi-card';

        const current = DATA.this_week.kpis[key];
        const target = DATA.targets[key];
        const met = cfg.lowerBetter ? current <= target : current >= target;

        card.innerHTML = `
            <div class="kpi-info">
                <h3>${cfg.label}</h3>
                <div class="current" style="color: ${met ? '#10b981' : '#f59e0b'}">${current}${cfg.unit}</div>
                <div class="target-info">/ ${target}${cfg.unit}</div>
            </div>
            <div class="kpi-chart"><canvas></canvas></div>
        `;
        grid.appendChild(card);

        // Destroy old chart
        if (charts[key]) charts[key].destroy();

        const canvas = card.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        const values = weeks.map(w => w[key]);
        const colors = values.map(v => {
            if (cfg.lowerBetter) return v <= target ? '#10b981' : v <= target * 1.2 ? '#f59e0b' : '#ef4444';
            return v >= target ? '#10b981' : v >= target * 0.8 ? '#f59e0b' : '#ef4444';
        });

        charts[key] = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: weeks.map(w => w.label),
                datasets: [{
                    data: values,
                    backgroundColor: colors.map(c => c + '88'),
                    borderColor: colors,
                    borderWidth: 1,
                    borderRadius: 2,
                    barPercentage: 0.7,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: 0 },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: (c) => c.raw + cfg.unit + ' (target: ' + target + cfg.unit + ')' }
                    },
                },
                scales: {
                    x: { display: false },
                    y: { display: false, beginAtZero: true },
                },
            },
            plugins: [{
                id: 'targetLine',
                afterDraw(chart) {
                    const yScale = chart.scales.y;
                    const y = yScale.getPixelForValue(target);
                    const cx = chart.ctx;
                    cx.save();
                    cx.strokeStyle = '#94a3b8';
                    cx.lineWidth = 1;
                    cx.setLineDash([3, 3]);
                    cx.beginPath();
                    cx.moveTo(chart.chartArea.left, y);
                    cx.lineTo(chart.chartArea.right, y);
                    cx.stroke();
                    cx.restore();
                }
            }],
        });
    }
}

function fmtHour(h) {
    const hr = Math.floor(h);
    const mn = Math.round((h - hr) * 60);
    return `${hr}:${mn.toString().padStart(2, '0')}`;
}

function kpiSignal(key, value) {
    const t = DATA.targets[key];
    const cfg = KPI_CONFIG[key];
    if (cfg.lowerBetter) {
        if (value <= t) return 'met';
        if (value <= t * 1.2) return 'warn';
        return 'bad';
    }
    if (value >= t) return 'met';
    if (value >= t * 0.7) return 'warn';
    return 'bad';
}

function renderWeekView(containerId, weekData, title) {
    const container = document.getElementById(containerId);
    const k = weekData.kpis;
    const T = DATA.targets;

    const stats = [
        { key: 'meeting_count', val: k.meeting_count, unit: '', tgt: T.meeting_count, label: 'Meetings' },
        { key: 'meeting_hours', val: k.meeting_hours, unit: 'h', tgt: T.meeting_hours + 'h', label: 'Hours' },
        { key: 'avg_duration', val: k.avg_duration, unit: 'm', tgt: T.avg_duration + 'm', label: 'Avg Duration' },
        { key: 'bundling_rate', val: k.bundling_rate, unit: '%', tgt: T.bundling_rate + '%', label: 'Bundled' },
        { key: 'free_days', val: k.free_days, unit: '', tgt: T.free_days, label: 'Free Days' },
        { key: 'focus_blocks', val: k.focus_blocks, unit: '', tgt: T.focus_blocks, label: 'Focus 3h+' },
    ];

    const statCards = stats.map(s => {
        const sig = kpiSignal(s.key, s.val);
        const color = sig === 'met' ? '#10b981' : sig === 'warn' ? '#f59e0b' : '#ef4444';
        return `<div class="week-stat ${sig}"><div class="val" style="color:${color}">${s.val}${s.unit}</div><div class="tgt">target: ${s.tgt}</div><div class="lbl">${s.label}</div></div>`;
    }).join('');

    const scoreColor = weekData.score >= 70 ? '#10b981' : weekData.score >= 40 ? '#f59e0b' : '#ef4444';

    let statsHtml = `
        <div class="week-header">
            <h2>${title} <span style="font-size:13px;color:#64748b">${weekData.dates[0]} to ${weekData.dates[4]}</span></h2>
            <div class="week-stats">
                ${statCards}
                <div class="week-stat" style="border-color:${scoreColor}55;background:${scoreColor}12">
                    <div class="val" style="color:${scoreColor}">${weekData.score}</div>
                    <div class="lbl">Score</div>
                </div>
            </div>
        </div>
    `;

    const HOUR_START = 8;
    const HOUR_END = 19;
    const TOTAL_HOURS = HOUR_END - HOUR_START;
    const PX_PER_HOUR = 550 / TOTAL_HOURS;

    let daysHtml = '<div class="day-grid">';
    weekData.days.forEach((day, i) => {
        const isToday = day.date === DATA.today;
        daysHtml += `<div class="day-col${isToday ? ' today' : ''}">`;
        daysHtml += `<div class="day-header"><span>${DAY_SHORT[i]} ${day.date.slice(5)}</span><span class="hours">${day.meeting_hours}h</span></div>`;
        daysHtml += `<div class="timeline">`;

        // Time markers
        for (let h = HOUR_START; h <= HOUR_END; h++) {
            const top = (h - HOUR_START) * PX_PER_HOUR;
            daysHtml += `<div class="time-marker" style="top:${top}px">${h}:00</div>`;
        }

        // Free blocks
        day.free_blocks.forEach(fb => {
            const top = (Math.max(fb.start, HOUR_START) - HOUR_START) * PX_PER_HOUR;
            const height = (Math.min(fb.end, HOUR_END) - Math.max(fb.start, HOUR_START)) * PX_PER_HOUR;
            if (height > 10) {
                daysHtml += `<div class="free-block" style="top:${top}px;height:${height}px">${fb.hours}h free</div>`;
            }
        });

        // Meeting blocks
        day.meetings.forEach(m => {
            const startH = Math.max(m.start_hour, HOUR_START);
            const endH = Math.min(m.end_hour, HOUR_END);
            const top = (startH - HOUR_START) * PX_PER_HOUR;
            const height = Math.max((endH - startH) * PX_PER_HOUR, 18);
            daysHtml += `<div class="meeting-block type-${m.meeting_type}" style="top:${top}px;height:${height}px" title="${m.title} (${fmtHour(m.start_hour)}-${fmtHour(m.end_hour)})">`;
            daysHtml += `<div class="mtitle">${m.title}</div>`;
            if (height > 30) daysHtml += `<div class="mtime">${fmtHour(m.start_hour)}-${fmtHour(m.end_hour)}</div>`;
            daysHtml += `</div>`;
        });

        daysHtml += `</div></div>`;
    });
    daysHtml += '</div>';

    let legendHtml = `
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#1d4ed8"></div>1:1</div>
            <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>Small Group (3-5)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#b45309"></div>Large (6+)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#064e3b;border:1px dashed #10b981"></div>Free Block</div>
        </div>
    `;

    container.innerHTML = statsHtml + daysHtml + legendHtml;
}

// Initial load + auto-refresh every 15 minutes
refresh();
setInterval(refresh, 15 * 60 * 1000);
</script>
</body>
</html>
